<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ad Performance Lab</title>
    <script>
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get() {
              return originalFetch;
            },
            set(val) {
              console.warn("Prevented overwriting window.fetch with:", val);
            },
            configurable: true,
            enumerable: true
          });
          
          if (typeof globalThis !== 'undefined') {
            const originalGlobalFetch = globalThis.fetch;
            Object.defineProperty(globalThis, 'fetch', {
              get() {
                return originalGlobalFetch || originalFetch;
              },
              set(val) {
                console.warn("Prevented overwriting globalThis.fetch with:", val);
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.error("Failed to inject safe fetch setter:", e);
        }
      })();
    </script>
  </head>
   <link rel="icon" type="image/x-icon" href="/favicon.png">
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
